<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 130" role="img" aria-label="Dependable Carriages — Executive Chauffeur Service">
  <defs>
    <linearGradient id="dcg" x1="0" y1="0" x2="0.22" y2="1">
      <stop offset="0"    stop-color="#FBEFA8"/>
      <stop offset="0.3"  stop-color="#E7C45F"/>
      <stop offset="0.55" stop-color="#C8982F"/>
      <stop offset="0.78" stop-color="#E7C45F"/>
      <stop offset="1"    stop-color="#9E6F1E"/>
    </linearGradient>
    <symbol id="crownL" viewBox="0 0 100 70">
      <path d="M6,58 L20,18 L36,44 L50,10 L64,44 L80,18 L94,58 Z"/>
      <rect x="6" y="53" width="88" height="11" rx="1.6"/>
      <circle cx="20" cy="16" r="4.4"/>
      <circle cx="50" cy="8" r="4.9"/>
      <circle cx="80" cy="16" r="4.4"/>
    </symbol>
  </defs>

  <!-- ===== Full crest seal (the business-card mark), fit into a 130x130 box ===== -->
  <g transform="scale(0.4643)">
    <circle cx="140" cy="140" r="120" fill="none" stroke="url(#dcg)" stroke-width="1.4"/>
    <circle cx="140" cy="140" r="92"  fill="none" stroke="url(#dcg)" stroke-width="0.7"/>
    <path id="tArc" d="M33,140 A107,107 0 0 1 247,140" fill="none"/>
    <path id="bArc" d="M247,140 A107,107 0 0 1 33,140" fill="none"/>
    <text font-family="Jost, sans-serif" font-weight="500" font-size="12.5" letter-spacing="4.4" fill="url(#dcg)"><textPath href="#tArc" startOffset="50%" text-anchor="middle">DEPENDABLE · CARRIAGES</textPath></text>
    <text font-family="Jost, sans-serif" font-weight="500" font-size="11" letter-spacing="5" fill="url(#dcg)"><textPath href="#bArc" startOffset="50%" text-anchor="middle" dy="-3">EXECUTIVE CHAUFFEUR</textPath></text>
    <g transform="translate(33,140) rotate(45)"><rect x="-4" y="-4" width="8" height="8" fill="url(#dcg)"/></g>
    <g transform="translate(247,140) rotate(45)"><rect x="-4" y="-4" width="8" height="8" fill="url(#dcg)"/></g>
    <use href="#crownL" x="110" y="62" width="60" height="42" fill="url(#dcg)"/>
    <text x="140" y="172" text-anchor="middle" font-family="Cormorant Garamond, serif" font-weight="600" font-size="72" letter-spacing="2" fill="url(#dcg)">DC</text>
    <text x="140" y="198" text-anchor="middle" font-family="Jost, sans-serif" font-weight="400" font-size="9" letter-spacing="3.4" fill="url(#dcg)">EST · MMXXVI</text>
  </g>

  <!-- ===== Wordmark (unchanged) ===== -->
  <text x="150" y="62" font-family="Cormorant Garamond, serif" font-weight="600" font-size="40" letter-spacing="0.5" fill="#141210">Dependable Carriages</text>
  <text x="152" y="86" font-family="Jost, sans-serif" font-weight="500" font-size="11.5" letter-spacing="5.5" fill="url(#dcg)">EXECUTIVE CHAUFFEUR SERVICE</text>
</svg>
